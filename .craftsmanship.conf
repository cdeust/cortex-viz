# .craftsmanship.conf — cortex-viz local overrides (coding-standards §10 rationale required)
#
# RATIONALE (2026-07-13): SEV_FUNCTION_TOO_LONG is downgraded to advise because
# the ui/ tree is browser-served JavaScript without a bundler: every module is
# wrapped in an IIFE `(function () { ... })()` to avoid leaking globals, and the
# craftsmanship detector measures that wrapper as a single function. Any ui/
# module longer than 50 lines therefore fires FUNCTION_TOO_LONG by construction,
# regardless of how small its inner functions are (e.g. ui/unified/js/detail_format.js,
# ui/brain/js/search.js — inner functions are within limits). The proper fix is
# upstream in zetetic-team-subagents (detector should recurse into IIFE bodies
# and measure inner functions); until then the rule stays visible as a warning.
# All other rules keep their strict defaults.
SEV_FUNCTION_TOO_LONG=advise

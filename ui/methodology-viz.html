<!DOCTYPE html>
<html lang="en" data-surface="paper">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortex — Methodology Map</title>
<script src="/shared/surface-toggle.js"></script>
<link rel="stylesheet" href="/shared/ds.css">
<link rel="stylesheet" href="methodology/css/theme.css">
<link rel="stylesheet" href="methodology/css/components.css">
<script src="/shared/palette.js"></script>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <div class="loader-title">CORTEX</div>
  <div class="loader-sub">Initializing cognitive map</div>
</div>

<div id="graph-canvas"></div>

<div id="info-panel" class="hud-panel">
  <div class="panel-header">
    <div class="reactor-dot"></div>
    <div>
      <div class="panel-title">CORTEX</div>
      <div class="panel-subtitle">Methodology Intelligence</div>
    </div>
  </div>
  <div class="stat-row"><span>Domains</span><span class="val" id="s-dom">--</span></div>
  <div class="stat-row"><span>Entry Points</span><span class="val" id="s-ent">--</span></div>
  <div class="stat-row"><span>Patterns</span><span class="val" id="s-pat">--</span></div>
  <div class="stat-row"><span>Tools</span><span class="val" id="s-tool">--</span></div>
  <div class="stat-row"><span>Blind Spots</span><span class="val" id="s-bs">--</span></div>
  <div class="stat-row"><span>Synapses</span><span class="val" id="s-edge">--</span></div>
</div>

<div id="status-bar" class="hud-panel">
  <div class="status-dot"></div>
  <span id="status-text">Initializing</span>
  <span style="color:var(--text-faint)">|</span>
  <span id="status-time"></span>
</div>

<button id="reset-btn">Reset</button>
<button id="surface-toggle" aria-label="Switch to instrument (ink) mode">Paper</button>

<div id="detail-panel">
  <button class="close-btn" id="close-detail">&#x2715;</button>
  <div id="detail-content"></div>
</div>

<div id="tooltip">
  <div class="tt-label" id="tt-label"></div>
  <div class="tt-type" id="tt-type"></div>
  <div class="tt-meta" id="tt-meta"></div>
</div>

<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:var(--node-domain)"></div>Domain</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--node-entry)"></div>Entry</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--node-pattern)"></div>Pattern</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--node-tool)"></div>Tool</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--node-bridge)"></div>Bridge</div>
  <div class="leg-item"><div class="leg-dot" style="background:var(--node-blindspot)"></div>Blind Spot</div>
</div>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>

<script src="methodology/js/config.js"></script>
<script src="methodology/js/state.js"></script>
<script src="methodology/js/data.js"></script>
<script src="methodology/js/stats.js"></script>
<script src="methodology/js/detail.js"></script>
<script src="methodology/js/tooltip.js"></script>
<script src="methodology/js/labels.js"></script>
<script src="methodology/js/nodes.js"></script>
<script src="methodology/js/graph.js"></script>
<script src="methodology/js/filters.js"></script>
<script src="methodology/js/main.js"></script>

<script>
(function () {
  var btn = document.getElementById('surface-toggle');
  if (!btn || !window.CortexSurface) return;
  function sync() {
    btn.textContent = window.CortexSurface.get() === 'paper' ? 'Paper' : 'Ink';
  }
  window.CortexSurface.bindButton(btn);
  window.addEventListener(window.CortexSurface.EVENT, sync);
  sync();
})();
</script>

</body>
</html>

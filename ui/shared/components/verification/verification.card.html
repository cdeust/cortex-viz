  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { ProofBadge, CitationTag, HeatBar, Legend, Stamp } = window.AIArchitectDesignSystem_2ec48f;
    function Demo(){
      return (
        <div>
          <div className="sec">
            <div className="lbl">ProofBadge — gate verdict</div>
            <div className="row">
              <ProofBadge status="proven"/>
              <ProofBadge status="unsourced">1 magic number</ProofBadge>
              <ProofBadge status="blocked">2 violations</ProofBadge>
              <ProofBadge status="pending"/>
            </div>
          </div>
          <div className="sec">
            <div className="lbl">CitationTag — the claim carries its source</div>
            <div className="claim">
              Retrieved memories become labile and can be rewritten <CitationTag source="Nader et al. 2000"/>; storage is gated by prediction error <CitationTag source="Friston 2005"/>.

          </div>
          <div className="sec">
            <div className="lbl">Stamp — the verdict made physical</div>
            <div className="row" style={{gap:26}}>
              <Stamp label="Proven" sub="n=500 · 2026-07-04"/>

            </div>
          </div>
          <div className="sec" style={{marginBottom:0}}>
            <div className="lbl">HeatBar · Legend — the data on the record</div>
            <div className="row" style={{gap:24}}>
              <div style={{width:190}}><HeatBar value={0.796}/></div>
              <div style={{width:190}}><HeatBar value={0.184} label="Saturation"/></div>

                {label:'Semantic', color:'var(--stage-recon)'},
                {label:'Causal', color:'var(--danger)', line:true},
              ]}/>
            </div>
          </div>
        </div>
      );
